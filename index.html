<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fffcfc;
            --text: #4a4a4a;
            --accent: #ff8a94;
            --ribbon-color: #ff5e6c;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: crosshair;
        }

        /* إخفاء السكرول بار تماماً */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none;  scrollbar-width: none; }

        .container { text-align: center; z-index: 10; width: 100%; max-width: 700px; padding: 20px; }

        #typewriter {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; height: 3.5rem; margin-bottom: 30px;
            color: var(--text); font-style: italic;
        }

        .timer {
            display: flex; justify-content: center; gap: 30px; margin-bottom: 60px;
            opacity: 0; transform: translateY(20px); transition: 1s ease;
        }
        .timer.visible { opacity: 1; transform: translateY(0); }
        .unit span { font-size: 2.2rem; font-weight: 500; color: var(--accent); }
        .unit label { font-size: 0.8rem; opacity: 0.5; letter-spacing: 2px; }

        /* الصندوق والفيونكة الكلاسيك */
        .gift-wrapper {
            position: relative; width: 180px; height: 180px; margin: 0 auto; cursor: pointer;
            opacity: 0; transform: scale(0.8); transition: 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .gift-wrapper.visible { opacity: 1; transform: scale(1); }

        .classic-bow {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 60px; z-index: 5; transition: 0.8s;
        }
        .bow-loop {
            position: absolute; width: 50px; height: 50px;
            border: 8px solid var(--ribbon-color); border-radius: 50% 50% 0 50%;
            transform: rotate(45deg); background: var(--bg);
        }
        .bow-loop.right { border-radius: 50% 50% 50% 0; transform: rotate(-45deg); left: 42px; }
        .bow-center {
            position: absolute; width: 25px; height: 25px; background: var(--ribbon-color);
            border-radius: 5px; left: 50%; top: 20px; transform: translateX(-50%); z-index: 6;
        }

        .gift-lid {
            position: absolute; width: 200px; height: 45px; 
            background: linear-gradient(135deg, #ffe3e5 0%, #ffd1d5 100%);
            top: -5px; left: -10px; border-radius: 10px; z-index: 4; border: 2px solid #fff;
            transition: 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }
        .gift-lid::after {
            content: ''; position: absolute; width: 100%; height: 15px;
            background: var(--ribbon-color); top: 50%; transform: translateY(-50%); left: 0;
        }

        .gift-box {
            position: absolute; width: 180px; height: 150px;
            background: linear-gradient(135deg, #ffe3e5 0%, #ffd1d5 100%);
            bottom: 0; border-radius: 0 0 20px 20px; border: 2px solid #fff; overflow: hidden;
        }
        .gift-box::after {
            content: ''; position: absolute; width: 35px; height: 100%;
            background: var(--ribbon-color); left: 50%; transform: translateX(-50%);
        }

        .gift-wrapper.open .gift-lid, .gift-wrapper.open .classic-bow { transform: translateY(-180px) rotate(-15deg); opacity: 0; }

        /* الودجت */
        .widget-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .widget-content {
            background: var(--glass); width: 95%; max-width: 1000px; padding: 40px;
            border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            transform: scale(0.8); opacity: 0; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh; overflow-y: auto; text-align: center;
        }
        .widget-overlay.active { display: flex; }
        .widget-overlay.active .widget-content { transform: scale(1); opacity: 1; }

        /* الكارت الأحمر */
        .flip-card {
            width: 100%; max-width: 400px; height: 220px; margin: 0 auto 50px;
            perspective: 1000px; cursor: pointer;
        }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 30px;
            display: flex; align-items: center; justify-content: center; padding: 30px;
        }
        .card-front { background: var(--ribbon-color); color: white; font-weight: 500; font-size: 1.3rem; }
        .card-back { background: white; border: 2px solid var(--ribbon-color); color: var(--text); transform: rotateY(180deg); line-height: 1.7; font-size: 1.1rem; }

        /* جاليري الصور */
        .photo-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px; margin-top: 30px; padding-bottom: 20px;
        }
        .photo-grid img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 20px; transition: 0.4s; cursor: pointer;
        }
        .photo-grid img:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 200; display: none;
            align-items: center; justify-content: center; cursor: zoom-out;
        }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 15px; animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-btn { margin-top: 40px; cursor: pointer; color: var(--accent); font-weight: 500; }

        /* القلوب والأنيميشن */
        .click-heart { position: fixed; pointer-events: none; z-index: 9999; color: var(--accent); font-size: 20px; animation: clickBurst 0.8s ease-out forwards; }
        @keyframes clickBurst { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(1.5); opacity: 0; } }
        .falling-heart { position: fixed; color: var(--accent); z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body onclick="spawnHearts(event)">

    <div id="heart-rain"></div>

    <div class="container">
        <div id="typewriter"></div>
        <div class="timer" id="timer-ui">
            <div class="unit"><span id="days">00</span><label>Days</label></div>
            <div class="unit"><span id="hours">00</span><label>Hours</label></div>
            <div class="unit"><span id="mins">00</span><label>Mins</label></div>
            <div class="unit"><span id="secs">00</span><label>Secs</label></div>
        </div>
        <div class="gift-wrapper" id="gift-ui" onclick="revealMagic(event)">
            <div class="classic-bow"><div class="bow-loop left"></div><div class="bow-loop right"></div><div class="bow-center"></div></div>
            <div class="gift-lid"></div><div class="gift-box"></div>
        </div>
    </div>

    <div class="widget-overlay" id="overlay" onclick="closeMagic()">
        <div class="widget-content" onclick="event.stopPropagation()">
            <h2 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 40px;">For My Princess ❤️</h2>
            
            <div class="flip-card" id="main-card" onclick="this.classList.toggle('flipped')">
                <div class="flip-card-inner">
                    <div class="card-front">You have a message 💌</div>
                    <div class="card-back">اكتب هنا كل الكلام اللي في قلبك.. بجد كل سنة وأنتي أحلى حاجة حصلت في حياتي!</div>
                </div>
            </div>

            <div class="photo-grid">
                <img src="photo1.jpg" onclick="openLightbox(this.src)">
                <img src="photo2.jpg" onclick="openLightbox(this.src)">
                <img src="photo3.jpg" onclick="openLightbox(this.src)">
                <img src="photo4.jpg" onclick="openLightbox(this.src)">
                <img src="photo5.jpg" onclick="openLightbox(this.src)">
                <img src="photo6.jpg" onclick="openLightbox(this.src)">
                <img src="photo7.jpg" onclick="openLightbox(this.src)">
                <img src="photo8.jpg" onclick="openLightbox(this.src)">
                <img src="photo9.jpg" onclick="openLightbox(this.src)">
                <img src="photo10.jpg" onclick="openLightbox(this.src)">
            </div>
            
            <div class="close-btn" onclick="closeMagic()">Close</div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <script>
        // الترتيب: الكلام الأول -> العداد -> الصندوق
        const text = "A little something for someone special...";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++; setTimeout(typeWriter, 100);
            } else {
                document.getElementById('timer-ui').classList.add('visible');
                setTimeout(() => { document.getElementById('gift-ui').classList.add('visible'); }, 1000);
            }
        }
        window.onload = typeWriter;

        const target = new Date("April 1, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
                document.getElementById('hours').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
                document.getElementById('mins').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                document.getElementById('secs').innerText = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            }
        }, 1000);

        function openLightbox(src) {
            event.stopPropagation();
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lb.style.display = 'flex';
        }

        function revealMagic(e) {
            e.stopPropagation();
            document.getElementById('gift-ui').classList.add('open');
            setTimeout(() => { document.getElementById('overlay').classList.add('active'); }, 700);
        }

        function closeMagic() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('gift-ui').classList.remove('open');
        }

        function spawnHearts(e) {
            for(let j=0; j<6; j++) {
                const h = document.createElement('div');
                h.className = 'click-heart'; h.innerHTML = '❤️';
                h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
                h.style.setProperty('--dx', (Math.random()*200 - 100) + 'px');
                h.style.setProperty('--dy', (Math.random()*200 - 100) + 'px');
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 800);
            }
        }

       // مطر القلوب التلقائي - تم زيادة الكثافة هنا
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'falling-heart'; 
            // مصفوفة لاختيار شكل القلب بشكل عشوائي للتنويع
            const heartTypes = ['❤️', '💖', '✨', '🌸', '💕'];
            h.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-20px'; // يبدأ من فوق الشاشة تماماً
            h.style.fontSize = (Math.random() * 20 + 10) + 'px'; // أحجام متنوعة
            h.style.opacity = Math.random(); // شفافية متغيرة لشكل ألطف
            h.style.animationDuration = (Math.random() * 3 + 3) + 's'; // سرعات متفاوتة
            
            document.getElementById('heart-rain').appendChild(h);
            
            // مسح العنصر بعد انتهاء الأنيميشن لتجنب ثقل الصفحة
            setTimeout(() => h.remove(), 6000);
        }, 150); // القيمة دي كانت 400، خليتها 150 عشان القلوب تنزل أسرع وبكمية أكبر
    </script>
</body>
</html>
