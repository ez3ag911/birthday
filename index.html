<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love ❤️</title>
    <style>
        :root {
            --primary-color: #ff4b5c;
            --secondary-color: #ff9a9e;
            --bg-color: #fdf2f2;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow-x: hidden;
            color: #444;
            text-align: center;
        }

        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .hero {
            padding: 80px 20px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 30px rgba(255, 75, 92, 0.3);
        }

        h1 { font-size: 2.2rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .count-box {
            background: var(--glass-bg);
            color: var(--primary-color);
            padding: 10px;
            border-radius: 15px;
            min-width: 65px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .count-box span { font-size: 1.5rem; display: block; }
        .count-box label { font-size: 0.7rem; text-transform: uppercase; color: #888; }

        .section-title { margin: 60px 0 30px; font-size: 2rem; color: var(--primary-color); position: relative; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .gallery-item {
            border-radius: 20px;
            height: 300px;
            background: #eee;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card { width: 280px; height: 200px; perspective: 1000px; }
        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
        }
        .card-front { background: white; border: 2px dashed var(--secondary-color); color: var(--primary-color); }
        .card-back { background: var(--primary-color); color: white; transform: rotateY(180deg); }

        footer { padding: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="heart-bg" id="hearts"></div>

    <header class="hero">
        <h1 id="headline">Waiting for the Special Moment... ❤️</h1>
        <div class="countdown" id="timer">
            <div class="count-box"><span id="days">00</span><label>Days</label></div>
            <div class="count-box"><span id="hours">00</span><label>Hours</label></div>
            <div class="count-box"><span id="mins">00</span><label>Mins</label></div>
            <div class="count-box"><span id="secs">00</span><label>Secs</label></div>
        </div>
    </header>

    <h2 class="section-title">Our Beautiful Memories</h2>
    <div class="gallery">
        <div class="gallery-item"><img src="photo1.jpg" alt="Memory 1"></div>
        <div class="gallery-item"><img src="photo2.jpg" alt="Memory 2"></div>
        <div class="gallery-item"><img src="photo3.jpg" alt="Memory 3"></div>
    </div>

    <div class="cards-container">
        <div class="card">
            <div class="card-inner">
                <div class="card-front"><h3>The First Day 🗓️</h3></div>
                <div class="card-back"><p>The moment my life truly started.</p></div>
            </div>
        </div>
        <div class="card">
            <div class="card-inner">
                <div class="card-front"><h3>My Promise 💍</h3></div>
                <div class="card-back"><p>To love you more with every passing day.</p></div>
            </div>
        </div>
    </div>

    <footer>Created with love ✨</footer>

    <script>
        const targetDate = new Date("April 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff > 0) {
                document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            } else {
                document.getElementById("headline").innerText = "HAPPY BIRTHDAY LOVE! 🎉";
                document.getElementById("timer").style.display = "none";
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        function createHeart() {
            const heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.style.position = "fixed";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "110vh";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            heart.style.opacity = Math.random();
            heart.style.zIndex = "-1";
            heart.style.transition = "top 6s linear, opacity 6s";
            document.getElementById("hearts").appendChild(heart);

            setTimeout(() => {
                heart.style.top = "-10vh";
                heart.style.opacity = "0";
            }, 100);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
